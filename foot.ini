# -*- conf -*-
[main]
font=Hack:size=8
dpi-aware=yes

# Make copy/paste feel more natural (highlight + release works better)
selection-target=both

[colors]
# Optional: nicer dark theme (uncomment if you want)
# background=1e1e1e
# foreground=d4d4d4

[mouse]
# This helps with primary selection syncing (good with the wl-paste watcher you already have)
hide-when-typing=yes

[key-bindings]
# Keep useful defaults but make font scaling easy
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0

# clipboard shortcuts (standard for Wayland terminals)
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
